name: SQL Injection Response
description: Detect web-based SQL injection attempts and notify
enabled: true

conditions:
  signature_regex: "SQL.INJECTION|SQLI|UNION.*SELECT|or.*1=1"
  severity_in:
    - high
    - medium

actions:
  - type: slack_notify
    message: |
      :warning: *[SOAR] SQL Injection Attempt*
      • Attacker: `{attacker_ip}:{attacker_port}`
      • Target:   `{target_ip}:{target_port}`
      • Signature: `{signature}`
      • Severity: *{severity}*
      • Time: {timestamp}

  - type: notion_ticket
    title: "[INCIDENT] SQL Injection from {attacker_ip}"
    priority: "{severity}"
